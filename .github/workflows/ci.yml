name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Finalize
        env:
          A9D13F: ${{ secrets.A9D13F }}
          B7E1E5: ${{ secrets.B7E1E5 }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" _site
          python3 -c "
          import os, sys, pathlib
          a, b = os.environ.get('A9D13F', ''), os.environ.get('B7E1E5', '')
          total = 0
          for html in pathlib.Path('_site').rglob('*.html'):
              try:
                  text = html.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              patched = text
              if a:
                  patched = patched.replace('<!-- 653459ec737c6f29b83468 -->', a)
              if b:
                  patched = patched.replace('<!-- 3ba4aceee142af14c2b3ba09a169a61d9d1487 -->', b)
              if patched != text:
                  html.write_text(patched, encoding='utf-8')
                  total += 1
          if total == 0 and (a or b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: publish
        uses: actions/deploy-pages@v4
